<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" rel="stylesheet">
    <title>Sword Art Online</title>
</head>
<body>
    <div class="header-top__bg"></div>
    <div class="header">
        <div class="navbar">
            <ul>
               <li><a href="#Home" class="active">Home</a></li>
                <li><a href="#character-card">Characters</a></li>
                <li><a href="#movie">Movies</a></li>
                <li><a href="#About Us">About Us</a></li>
            </ul>
        </div>
    </div>
    <div class="imagecontainer" id="Home">
        <video style="object-fit: cover;" class="mv-bg" id="video" webkit-playsinline playsinline muted autoplay loop>
            <source src="https://saovs-web-contents.s3.ap-northeast-1.amazonaws.com/movie/saovs_movie.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="container">
            <div class="text">Sword Art Online</div>
        </div>
    </div>
    <div class="add-character-container" id="character-card">
        <div class="cards-heading">
            <h1>Characters</h1>
        </div>
        <div class="swiper-container">
            <div class="swiper-wrapper">
                <div class="swiper-slide character-card">
                    <img src="Kirito.png" alt="Kirito">
                    <h3>Kirito</h3>
                    <p>The Black Swordsman</p>
                </div>
                <div class="swiper-slide character-card">
                    <img src="Asuna.png"  height="600px" alt="Asuna">
                    <h3>Asuna</h3>
                    <p>The Flash</p>
                </div>
                <div class="swiper-slide character-card">
                    <img src="Sinon-0.webp" alt="Sinon">
                    <h3>Sinon</h3>
                    <p>The Sniper</p>
                </div>
                <div class="swiper-slide character-card">
                    <img src="Sinon-0.webp" alt="Sinon">
                    <h3>Sinon</h3>
                    <p>The Sniper</p>
                </div>
                <div class="swiper-slide character-card">
                    <img src="Sinon-0.webp" alt="Sinon">
                    <h3>Sinon</h3>
                    <p>The Sniper</p>
                </div>
                <div class="swiper-slide character-card">
                    <img src="Sinon-0.webp" alt="Sinon">
                    <h3>Sinon</h3>
                    <p>The Sniper</p>
                </div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper-container', {
            slidesPerView: 1,
            spaceBetween: 20,
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            loop: true,
        });
    </script>
    <script src="script.js"></script>
    <footer>
    </footer>
    <p>Made By Nitin</p>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
</body>
</html>
